<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - StayLy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style/style.css">
  <link rel="icon" href="../assets/icon.png" type="image/png">
</head>
<body>
  <div class="dashboard" id="dashboard">
  <header class="header">
    <div class="logo">SatyLy</div>

    <div class="user-profile" id="userDropdown">
      <span id="userName">Carregando...</span>
      <span class="arrow">▼</span>
      <div class="dropdown-menu">
        <a href="#" id="logoutBtn">Sair</a>
      </div>
    </div>
  </header>
    
    <div class="container">
      <div class="summary">
        <div class="summary-card occupied"><h3>Ocupados</h3><p id="occupiedRooms">0</p></div>
        <div class="summary-card reserved"><h3>Reservados</h3><p id="reservedRooms">0</p></div>
        <div class="summary-card available"><h3>Disponíveis</h3><p id="availableRooms">0</p></div>
        <div class="summary-card total"><h3>Total</h3><p id="totalRooms">0</p></div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="addRoomBtn"><i class="fas fa-plus"></i> Adicionar Quarto</button>
      </div>

      <table id="roomsTable">
        <thead>
          <tr>
            <th>Nº Quarto</th>
            <th>Responsável</th>
            <th>Status</th>
            <th>Pessoas</th>
            <th>Entrada</th>
            <th>Saída Prevista</th>
            <th>Valor</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Modal para Quartos -->
  <div class="modal" id="roomModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Adicionar Quarto</h2>
        <span class="close" onclick="closeModal('roomModal')">&times;</span>
      </div>
      <form id="roomForm">
        <input type="hidden" id="roomId">
        <div class="form-group"><label>Nome Responsável</label><input type="text" id="responsavelNome" required></div>
        <div class="form-group"><label>CPF</label><input type="text" id="responsavelCpf" required></div>
        <div class="form-group"><label>Telefone</label><input type="text" id="telefoneContato" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="emailContato" required></div>
        <div class="form-group"><label>Nº Quarto</label><input type="text" id="numeroQuarto" required></div>
        <div class="form-group">
          <label>Status</label>
          <select id="status" required>
            <option value="">Selecionar</option>
            <option value="Ocupado">Ocupado</option>
            <option value="Reservado">Reservado</option>
            <option value="Disponível">Disponível</option>
          </select>
        </div>
        <div class="form-group"><label>Qtd Pessoas</label><input type="number" id="quantidadePessoas" required></div>
        <div class="form-group"><label>Check-in</label><input type="date" id="checkIN" required></div>
        <div class="form-group"><label>Saída Prevista</label><input type="date" id="saidaPrevista" required></div>
        <div class="form-group"><label>Tipo Veículo</label>
          <select id="tipoVeiculo">
            <option value="">Nenhum</option>
            <option value="Carro">Carro</option>
            <option value="Moto">Moto</option>
          </select>
        </div>
        <div class="form-group"><label>Marca</label><input type="text" id="marcaVeiculo"></div>
        <div class="form-group"><label>Modelo</label><input type="text" id="modeloVeiculo"></div>
        <div class="form-group"><label>Placa</label><input type="text" id="placaVeiculo"></div>
        <div class="form-group"><label>Valor do Quarto</label><input type="number" id="valorQuarto" step="0.01" required></div>
        <div class="form-group"><label>Observações</label><textarea id="observacoes"></textarea></div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeModal('roomModal')">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../script/main.js"></script>
</body>
</html>
